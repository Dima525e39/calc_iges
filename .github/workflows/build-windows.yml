name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build portable EXE
        run: python -m PyInstaller --clean --noconfirm IGESCutCalculator.spec

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: IGESCutCalculator-windows
          path: dist/IGESCutCalculator.exe
